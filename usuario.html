<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>UsuГЎrio</title>
</head>

<body style="margin:0;font-family:Arial;background:#f5f5f5;">

<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#3b6edc;color:white;">
  <div onclick="voltar()" style="cursor:pointer;font-size:20px;">в†ђ</div>
  <div style="font-weight:bold;">UsuГЎrio</div>
  <div onclick="sair()" style="cursor:pointer;">Sair</div>
</div>

<div id="conteudo" style="padding:20px;"></div>

<script>

// ================= USUГЃRIO =================
let usuarioLogado = localStorage.getItem("usuario") || "admin";

// вњ… COLOQUE AQUI (fora de qualquer funГ§ГЈo!)
function formatarNome(nome){
  return nome.charAt(0).toUpperCase() + nome.slice(1);
}
function obterPerfil(usuario){

  let senha = localStorage.getItem("senha");

  // вњ… REGRA PRIORITГЃRIA
  if(senha === "123456") return "Pais";

  if(usuario === "admin") return "Administrador";
  if(usuario === "ananda") return "Professor";
  if(usuario === "pai") return "Pais";

  return "Aluno";
}


let perfilLogado = obterPerfil(usuarioLogado);

// ================= RESET SENHA =================
function resetarSenha(){
  let chave = "senha_" + usuarioLogado;
  localStorage.setItem(chave,"123");
}

// ================= NAV =================
function voltar(){
  resetarSenha();
  window.location.href="menu.html";
}

function sair(){
  resetarSenha();
  window.location.href="index.html";
}

// ================= UI =================
function botaoVoltar(){
return `<div onclick="inicio()" style="margin-bottom:15px;color:#3b6edc;cursor:pointer;font-weight:bold;">в¬… Voltar</div>`;
}

function card(icon,titulo,acao){
return `
<div onclick="${acao}" 
style="min-width:240px;background:white;padding:25px;border-radius:14px;border:3px solid #ddd;cursor:pointer;text-align:center;"
onmouseover="this.style.border='3px solid #3b6edc'"
onmouseout="this.style.border='3px solid #ddd'">
<div style="font-size:45px;">${icon}</div>
<b>${titulo}</b>
</div>`;
}

// ================= INICIO =================
function inicio(){

  // вњ… sempre reseta ao voltar pra home
  resetarSenha();

  document.getElementById("conteudo").innerHTML=`
  <h2>UsuГЎrio</h2>

  <div style="background:white;padding:20px;border-radius:10px;border:2px solid #ddd;margin-bottom:20px;">
  <b>UsuГЎrio:</b> ${formatarNome(usuarioLogado)}<br><br>
  <b>Perfil:</b> ${perfilLogado}<br><br>
  <b>Status:</b> Ativo
  </div>

  <div style="display:flex;gap:25px;flex-wrap:wrap;">
  ${card("рџ”ђ","Login e autenticaГ§ГЈo","login()")}
  ${card("рџ‘¤","Perfis","perfis()")}
  ${card("вљ™пёЏ","ConfiguraГ§Гµes","config()")}
  ${card("рџ›ЎпёЏ","Privacidade","privacidade()")}
  </div>`;
}

// ================= LOGIN =================
function login(){
document.getElementById("conteudo").innerHTML=`
${botaoVoltar()}

<h2>Login e autenticaГ§ГЈo</h2>

<div style="background:white;padding:20px;border-radius:10px;border:2px solid #ddd;margin-bottom:20px;">
<b>UsuГЎrio:</b> ${formatarNome(usuarioLogado)}
<br><br>
<b>Perfil:</b> ${perfilLogado}<br><br>
<b>Status:</b> autenticado<br><br>
</div>

<button onclick="abrirModalSenha()" style="
padding:10px 20px;
background:#3b6edc;
color:white;
border:none;
border-radius:6px;
cursor:pointer;">
Alterar senha
</button>
`;
}

// ================= MODAL =================
function abrirModalSenha(){
document.body.insertAdjacentHTML("beforeend",`
<div id="modalSenha" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;">

<div style="background:white;padding:25px;border-radius:10px;width:350px;position:relative;">

<div onclick="fecharModal()" style="position:absolute;top:10px;right:15px;cursor:pointer;">вњ–</div>

<h3>AlteraГ§ГЈo de senha</h3>

<input id="senhaAtual" type="password" placeholder="Senha atual" style="width:100%;padding:10px;margin-bottom:10px;">
<input id="novaSenha" type="password" placeholder="Nova senha" style="width:100%;padding:10px;margin-bottom:10px;">
<input id="confSenha" type="password" placeholder="Confirmar senha" style="width:100%;padding:10px;margin-bottom:10px;">

<button onclick="alterarSenha()" style="width:100%;padding:10px;background:#28a745;color:white;border:none;border-radius:6px;">
Salvar nova senha
</button>

<div id="msgSenha" style="margin-top:10px;"></div>

</div>
</div>
`);
}

function fecharModal(){
document.getElementById("modalSenha").remove();
}

// ================= ALTERAR SENHA =================
function alterarSenha(){

let atual = document.getElementById("senhaAtual").value;
let nova = document.getElementById("novaSenha").value;
let conf = document.getElementById("confSenha").value;
let msg = document.getElementById("msgSenha");

let chave = "senha_" + usuarioLogado;
let senha = localStorage.getItem(chave) || "123";

if(atual !== senha){
  msg.innerHTML = "<span style='color:red;'>Senha atual incorreta</span>";
  return;
}

if(nova.length < 3){
  msg.innerHTML = "<span style='color:red;'>Senha muito curta</span>";
  return;
}

if(nova !== conf){
  msg.innerHTML = "<span style='color:red;'>ConfirmaГ§ГЈo diferente</span>";
  return;
}

localStorage.setItem(chave,nova);
msg.innerHTML = "<span style='color:green;'>Senha alterada вњ…</span>";
}

// ================= PERFIS =================
function perfis(){
document.getElementById("conteudo").innerHTML=`
${botaoVoltar()}

<h2>Perfis do sistema</h2>

${perfilItem("рџ‘ЁвЂЌрџЋ“","Aluno","Acesso a conteГєdos, tarefas e acompanhamento escolar")}
${perfilItem("рџ‘ЁвЂЌрџ‘©вЂЌрџ‘§","Pais","Acompanhamento escolar, notas, frequГЄncia e comunicaГ§ГЈo com a instituiГ§ГЈo")}
${perfilItem("рџ‘ЁвЂЌрџЏ«","Professor","GestГЈo de turmas, avaliaГ§Гµes e comunicaГ§ГЈo com responsГЎveis")}
${perfilItem("рџ‘ЁвЂЌрџ’ј","Administrador","Controle completo do sistema, usuГЎrios e dados acadГЄmicos")}

`;
}


function perfilItem(icon,nome,desc){

let ativo = nome === perfilLogado;

return `
<div
onmouseover="this.style.border='2px solid #3b6edc'"
onmouseout="this.style.border='2px solid ${ativo ? '#28a745' : '#ddd'}'"
style="
background:${ativo ? '#e8f5e9' : 'white'};
padding:15px;
margin:10px 0;
border-radius:10px;
border:2px solid ${ativo ? '#28a745' : '#ddd'};
transition:0.2s;
">

<div style="font-size:18px;">
<b>${icon} ${nome}</b>
</div>

<br>

${desc}

${ativo ? '<br><br><b style="color:#28a745;">вњ” Perfil ativo</b>' : ''}

</div>
`;
}

// ================= OUTROS =================
function config(){
document.getElementById("conteudo").innerHTML = `
${botaoVoltar()}

<h2>ConfiguraГ§Гµes pessoais</h2>

${itemConfig("рџ”ђ","Alterar senha dos colaboradores","Gerencie a tenha de terceiros de acesso ao sistema (via Login)")}
${itemConfig("рџ“§","Alterar e-mail dos colaboradores","Atualize endereГ§o de contato de terceiros")}
${itemConfig("рџ””","NotificaГ§Гµes","Configure alertas e avisos do sistema")}
${itemConfig("рџЋЁ","Tema do sistema","Defina aparГЄncia clara ou escura")}
${itemConfig("рџЊђ","Idioma","Selecione o idioma do sistema")}
${itemConfig("рџ“±","Dispositivos conectados","Gerencie acessos ativos")}
${itemConfig("рџ”Љ","PreferГЄncias de som","Ativar ou desativar sons")}
${itemConfig("рџ“Љ","PreferГЄncias de uso","ConfiguraГ§ГЈo de comportamento")}
${itemConfig("рџ§ѕ","HistГіrico de alteraГ§Гµes","Ver mudanГ§as recentes")}
${itemConfig("вљ™пёЏ","ConfiguraГ§Гµes avanГ§adas","Ajustes tГ©cnicos do sistema")}

`;
}

function privacidade(){
document.getElementById("conteudo").innerHTML = `
${botaoVoltar()}

<h2>Privacidade</h2>

${itemPriv("рџ”ђ","Dados pessoais","Gerencie suas informaГ§Гµes cadastradas no sistema")}
${itemPriv("рџ”’","SeguranГ§a da conta","Controle acesso e sessГµes ativas")}
${itemPriv("рџ§ѕ","HistГіrico de acessos","Visualize logins recentes")}
${itemPriv("рџ“Љ","Uso de dados","Controle permissГµes e utilizaГ§ГЈo")}
${itemPriv("рџ‘ЃпёЏ","Visibilidade de perfil","Defina quem pode ver suas informaГ§Гµes")}
${itemPriv("рџ“Ќ","LocalizaГ§ГЈo","Controle uso de dados de localizaГ§ГЈo")}
${itemPriv("рџ””","PermissГµes de notificaГ§ГЈo","Gerenciar envio de alertas")}
${itemPriv("рџ“Ѓ","Compartilhamento de dados","Controle integraГ§ГЈo com outros usuГЎrios")}
${itemPriv("рџ›ЎпёЏ","ProteГ§ГЈo de conta","ConfiguraГ§Гµes adicionais de seguranГ§a")}
${itemPriv("вљ™пёЏ","ConfiguraГ§Гµes avanГ§adas","Ajustes de privacidade do sistema")}

`;
}

function item(t,d){
return `<div style="background:white;padding:15px;margin:10px 0;border-radius:10px;border:2px solid #ddd;"><b>${t}</b><br>${d}</div>`;
}

function itemPriv(icon,titulo,desc){
return `
<div
onmouseover="this.style.border='2px solid #3b6edc'"

style="
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;

cursor:pointer;
transition:0.2s;
">

// START
inicio();
function itemConfig(icon,titulo,desc){
return `
<div
onmouseover="this.style.border='2px solid #3b6edc'"
onmouseout="this.style.border='2px solid #ddd'"
style="
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
border:2px solid #ddd;
cursor:pointer;
transition:0.2s;
">

<b>${icon} ${titulo}</b><br><br>

${desc}

</div>
`;
}

</script>

</body>
</html>
