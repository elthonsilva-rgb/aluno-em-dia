<!DOCTYPE html>
<html lang="pt-br">
<head>
<script src="app.js"></script>

<meta charset="UTF-8">
<title>Cadastro de Aluno</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- TOPO -->
<header style="
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#3b6edc;
  color:white;
  padding:10px 15px;
">

<button onclick="window.location.href='aluno.html'" style="
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
  ">←</button>

  <h1>Cadastro de Aluno</h1>

  <button onclick="logout()" style="
    background:#2f54c2;
    border:none;
    color:white;
    padding:6px 12px;
    border-radius:5px;
    cursor:pointer;
  ">Sair</button>

</header>


<!-- FORMULÁRIO -->
<main style="padding:20px;">

  <div class="card" style="max-width:500px; margin:auto;">

    <h3>Preencha os dados</h3>

    <br>

    <label>Nome completo:</label><br><br>
    <input type="text" id="nome" style="width:100%; padding:8px;"><br><br>

    <label>Idade:</label><br><br>
    <select id="idade" style="width:100%; padding:8px;">2  <option value="">--Escolha--</option>3  <option value="5">5 anos</option>4  <option value="6">6 anos</option>5  <option value="7">7 anos</option>6  <option value="8">8 anos</option>7  <option value="9">9 anos</option>8  <option value="10">10 anos</option>9  <option value="11">11 anos</option>10  <option value="12">12 anos</option>11  <option value="13">13 anos</option>12  <option value="14">14 anos</option>13  <option value="15">15 anos</option>14  <option value="16">16 anos</option>15</select><br><br>
	
	<label>E-mail:</label><br><br>
    <input type="email" id="email" style="width:100%; padding:8px;"><br><br>

    <label>Ano:</label><br><br>
   
   <select id="ano" style="width:100%; padding:8px;">
      <option value="">--Escolha--</option>
      <option value="1">1º Ano</option>
      <option value="2">2º Ano</option>
      <option value="3">3º Ano</option>
      <option value="4">4º Ano</option>
      <option value="5">5º Ano</option>
      <option value="6">6º Ano</option>
      <option value="7">7º Ano</option>
      <option value="8">8º Ano</option>
      <option value="9">9º Ano</option>
    </select><br><br>
    <label>Turma:</label><br><br>
    <select id="turma" style="width:100%; padding:8px;">
      <option value="">--Escolha--</option>
      <option value="A">Turma A</option>
      <option value="B">Turma B</option>
    </select><br><br>

    <div style="text-align:center;">
      <button onclick="salvarAluno()" style="
        background:#28a745;
        color:white;
        border:none;
        padding:10px 20px;
        border-radius:5px;
        cursor:pointer;
        font-size:14px;
      ">
        Salvar Aluno
      </button>
	<div id="resultadoRA" style="
  margin-top:20px;
  text-align:center;
  font-weight:bold;
  font-size:16px;
  color:#333;
"></div>
 </div>

  </div>

</main>



</script>

</body>
</html>
